plugins {
    id "com.android.application"
    id "kotlin-android"
    id "org.jetbrains.kotlin.plugin.compose"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def isReleaseTaskRequested = gradle.startParameter.taskNames.any { it.toLowerCase().contains("release") }
def requiredSigningKeys = ["keyAlias", "keyPassword", "storeFile", "storePassword"]
def missingSigningKeys = requiredSigningKeys.findAll { key ->
    def value = keystoreProperties[key]
    value == null || value.toString().trim().isEmpty()
}
def keystoreFile = missingSigningKeys.isEmpty()
    ? rootProject.file(keystoreProperties["storeFile"])
    : null
def releaseSigningError = null
if (!keystorePropertiesFile.exists()) {
    releaseSigningError = "Missing android/key.properties"
} else if (!missingSigningKeys.isEmpty()) {
    releaseSigningError = "android/key.properties is missing required keys: ${missingSigningKeys.join(', ')}"
} else if (!keystoreFile.exists()) {
    releaseSigningError = "Android keystore file was not found: ${keystoreFile}"
}
def releaseSigningReady = releaseSigningError == null

android {
    namespace = "com.krustykrab.petnote"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    signingConfigs {
        release {
            if (releaseSigningReady) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile keystoreFile
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    buildFeatures {
        compose true
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.krustykrab.petnote"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            if (releaseSigningReady) {
                signingConfig = signingConfigs.release
            }
        }
    }
}

if (isReleaseTaskRequested && !releaseSigningReady) {
    throw new GradleException(
        "Android release signing is not configured. ${releaseSigningError}. " +
        "Run scripts/prepare-android-signing.ps1 on Windows or scripts/prepare-android-signing.sh on macOS/Linux, " +
        "or provide android/key.properties and android/signing/pet-release.jks."
    )
}

flutter {
    source = "../.."
}

dependencies {
    implementation "androidx.compose.foundation:foundation:1.10.3"
    implementation "androidx.compose.material:material-icons-extended:1.7.8"
    implementation "androidx.compose.ui:ui:1.10.3"
    implementation "androidx.compose.ui:ui-graphics:1.10.3"
    implementation "androidx.compose.ui:ui-util:1.10.3"
    implementation "io.github.kyant0:backdrop:1.0.6"
    implementation "io.github.kyant0:shapes:1.2.0"
    implementation "com.google.code.findbugs:jsr305:3.0.2"
    implementation "com.google.errorprone:error_prone_annotations:2.28.0"
    implementation "androidx.security:security-crypto:1.1.0-alpha06"
    implementation "com.google.android.material:material:1.12.0"
    testImplementation "junit:junit:4.13.2"
}
